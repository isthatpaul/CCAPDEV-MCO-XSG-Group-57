<!DOCTYPE html> 
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>User Profile - TaftBites</title>
        <link rel="stylesheet" href="css/base.css">
        <link rel="stylesheet" href="css/Profile.css">
    </head>
    <body>
        <!-- Sidebar Toggle Button -->
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle menu">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
        </button>

        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar Navigation -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>TaftBites</h1>
                <p class="tagline">Discover restaurants near DLSU</p>
            </div>
            <ul class="sidebar-menu" id="navMenu">
                <li><a href="index.html"><img src="icons/house.png" class="menu-icon" alt=""> Home</a></li>
                <li><a href="establishments.html"><img src="icons/utensils.png" class="menu-icon" alt=""> Establishments</a></li>
                <li><a href="profile.html" class="active"><img src="icons/user.png" class="menu-icon" alt=""> Profile</a></li>
                <li><a href="register.html"><img src="icons/sign up.png" class="menu-icon" alt=""> Sign Up</a></li>
                <li><a href="login.html" id="logoutBtn"><img src="icons/login.png" class="menu-icon" alt=""> Login</a></li>
            </ul>
        </nav>

    <main class="main">
        <div class="container">
            <div class="main-content">
                <div class="main-left">
                    <div class="card" id="profile-info">
                        <div id="profile_photo" class="card center">
                            <h3>Profile Photo</h3> 
                            <img id="profileImg" src="sample_profile.jpg" alt="Profile photo."> 
                        </div>
                        <div id="join_date" style="margin-top:12px">
                            <h3 id="member-since">Member Since:</h3> 
                            <p id="joinDateText">February 2026</p>
                        </div>
                        <div id="bio" style="margin-top:12px">
                            <h3>Bio</h3>
                            <p id="bioInfo">User bio goes here</p>
                        </div>
                        <div id="contact_info" style="margin-top:12px">
                            <h3>Contact Information</h3>
                            <p id="email">Email: user@example.com</p>
                            <p id="contactNo">Contact No.: 0912345678</p>
                        </div>
                        <button id="edit-button" style="display:none;">Edit Profile</button>
                    </div>
                </div>

                <div class="main-right">
                    <div class="card" id="edit-card" style="display:none;">
                        <h3>Edit Profile</h3>
                        <form id="editProfileForm">
                            <div>
                                <label for="editBio">Update Bio</label>
                                <textarea id="editBio" name="bio" rows="4" placeholder="Tell other users about yourself..."></textarea>
                            </div>
                            <div>
                                <label for="editEmail">Update Contact Email</label>
                                <input type="email" id="editEmail" name="email" placeholder="you@example.com">
                            </div>
                            <div>
                                <label for="editPhone">Update Contact Number</label>
                                <input type="tel" id="editPhone" name="phone" placeholder="0917xxxxxxx">
                            </div>
                            <div>
                                <label for="editPicture">Change Profile Picture</label>
                                <input type="file" id="editPicture" name="picture">
                            </div>
                            <div style="margin-top:10px">
                                <button type="submit">Save Changes</button>
                                <button type="button" id="cancelEditBtn">Cancel</button>
                            </div>
                        </form>
                    </div>

                    <!-- Reviews Container -->
                    <div>
                        <h3 id="reviewsHeading">Reviews</h3>
                        <div id="user-reviews" style="margin-top:12px">
                            <!-- Reviews populated by JavaScript -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>TaftBites © 2026</p>
    </footer>

    <script src="JS/Users.js"></script>
    <script src="JS/nav.js"></script>
    <script src="JS/sidebar.js"></script>
    <script src="js/Profile.js"></script>
    </body>
</html>
